<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#e8a217" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8a217" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="11" fill="#111114"/>
  <!-- Amber radial glow -->
  <rect width="64" height="64" rx="11" fill="url(#glow)"/>
  <!-- Amber top limelight bar -->
  <rect x="18" y="0" width="28" height="3.5" rx="2" fill="#e8a217" opacity="0.95"/>

  <!-- Y.E.N — amber dots between letters match the nav logo -->
  <text
    x="32"
    y="42"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="19"
    fill="#edeae4"
  >Y<tspan fill="#e8a217">.</tspan>E<tspan fill="#e8a217">.</tspan>N</text>
</svg>
